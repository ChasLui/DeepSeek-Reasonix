name = "Dev"
icon = "run"
command = "npm run dev"

[[actions]]
name = "Chat"
icon = "chat"
command = "npm run chat"

[[actions]]
name = "Verify"
icon = "check"
command = "npm run verify"

[[actions]]
name = "Test"
icon = "test"
command = "npm run test"

[[actions]]
name = "Lint"
icon = "lint"
command = "npm run lint"

[[actions]]
name = "Typecheck"
icon = "check"
command = "npm run typecheck"

[[actions]]
name = "Build"
icon = "build"
command = "npm run build"

[[actions]]
